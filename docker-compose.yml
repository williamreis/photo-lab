services:
  redis:
    image: redis:7-alpine
    container_name: photo-lab-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: photo-lab-api
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - FAL_KEY=${FAL_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AGENT_MODEL=${AGENT_MODEL:-google/gemini-2.0-flash}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./backend:/app/backend
      - ./backend/storage/uploads:/app/backend/storage/uploads
      - ./backend/storage/history:/app/backend/storage/history
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: photo-lab-worker
    working_dir: /app/backend
    command: ["python", "worker.py"]
    environment:
      - FAL_KEY=${FAL_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AGENT_MODEL=${AGENT_MODEL:-google/gemini-2.0-flash}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./backend:/app/backend
      - ./backend/storage/uploads:/app/backend/storage/uploads
      - ./backend/storage/history:/app/backend/storage/history
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: photo-lab-frontend
    ports:
      - "${FRONTEND_PORT:-8101}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx/nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  uploads_data:
  history_data:
